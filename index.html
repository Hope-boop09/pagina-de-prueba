<!DOCTYPE html>
<html>
  <head>
    <title>Mi proyecto web</title>

    <style>
      body {
        background-color: #0d0d0d;
        font-family: Arial;
        text-align: center;
        color: white;
        margin: 0;

        animation: aparecer 2s ease-in; /*AQUÍ*/
      }
      
      .caja {
        background-color: #1a1a1a;
        margin: 20px auto;
        padding: 20px;
        border-radius: 15px;
        width: 80%;
        max-width: 600px;
        box-shadow: 0px 0px 15px rgba(255, 0, 0, 0.2);
        transition: 0.3s; /* animación */
      }

      .caja:hover {
        transform: scale(1.03);
      }
      
      h1 {
        color: #ff1a1a;
      }

      h2, h3 {
        color: #ff4d4d;
      }
      
      p {
        color: #ccc;
      }

      img {
        width: 250px;
        border-radius: 50%;
        margin-top: 20px;
        border: 3px solid #ff1a1a;
      }

      img:hover {
        transform: scale(1.05);
        transition: 0.3s;
      }

      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: #ff1a1a;
        color: white;
        text-decoration: none;
        border-radius: 10px;
      }

      .btn:hover {
        background: #cc0000;
      }
      @keyframes aparecer {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
    }
  }
    </style>

  </head>

  <body>

    <h1>Mi primer proyecto web 🖤</h1>
    <p>Este sitio fue creado como proyecto de mi curso de diseño web 🌐</p>

    <div class="caja">
      <h2>Sobre este proyecto</h2>
      <p>Este proyecto fue desarrollado desde cero utilizando HTML y CSS y publicado en GitHub Pages.</p>
    </div>

    <div class="caja">
      <h3>Mis metas</h3>
     <p> quiero viajar a canada </p>
    </div>

    <!-- TU FOTO -->
    <div class="caja">
    <img src="mi_foto.jpeg">
    </div>

    <!-- BOTÓN -->
    <br>

    <div class="caja">
      <h3>Mis enlaces</h3>
    <a href="https://github.com/hope-boop09" class="btn">Mi GitHub</a>
    </div>
    
  </body>
</html>
