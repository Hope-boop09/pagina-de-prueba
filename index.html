<!DOCTYPE html>
<html>
<head>
  <title>Proyecto web sobre la acuacultura</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: linear-gradient(to right, #00c6ff, #0072ff);
      font-family: Arial;
      text-align: center;
      color: blue;
      margin: 0;
      animation: aparecer 2s ease-in;
    }

    .caja {
      background-color: rgba(0, 255, 0, 0.5);
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 600px;
      box-shadow: 0px 0px 15px rgba(0, 255, 0, 0.5);
      transition: 0.3s;
    }

    .caja:hover {
      transform: scale(1.03);
      border: 3px solid darkblue;
    }

    h1 {
      color: #a8edea;
    }

    h2, h3 {
      color: #2c3e50;
    }

    p {
      color: #00c853;
    }

    img {
      width: 250px;
      border-radius: 50%;
      margin-top: 20px;
      border: 3px solid #b2f7ef;
      transition: 0.3s;
    }

    img:hover {
      transform: scale(1.05);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: green;
      color: blue;
      text-decoration: none;
      border-radius: 10px;
    }

    .btn:hover {
      background: #b2f7ef;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <h1>Mi primer proyecto web de acuacultura</h1>
  <p>Este sitio fue creado como proyecto de mi curso de diseño web</p>

  <div class="caja">
    <h2>Sobre este proyecto:</h2>
    <p>Este proyecto fue desarrollado desde cero utilizando HTML y CSS.</p>
  </div>

  <div class="caja">
    <h3>Mis metas:</h3>
    <p>Quiero dar a conocer más sobre la acuacultura.</p>
  </div>

  <div class="caja">
    <img src="https://www.acuacultura.com.mx/wp-content/uploads/2023/08/acuacultura-banner-1080x391.jpg">
  </div>

  <div class="caja">
    <h3>Mis enlaces</h3>
    <a href="https://github.com/hooe-boop09" class="btn">Mi GitHub</a>
  </div>

</body>
</html>
